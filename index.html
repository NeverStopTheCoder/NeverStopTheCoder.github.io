<!DOCTYPE html>
<html>
    <head>
        <title>MakeCodeDataBase</title>
        <link rel="icon" type="image/png" href="favicon.png">
    </head>
    <body style="background-color: powderblue;"> 
        <button onclick="AddPost(document.getElementById('myInput2').value,document.getElementById('myInput').value,document.getElementById('myInput3').value);" style="position: absolute; right: 150px; width: 120px; height: 50px; Font-Size:25px; background-color:gray; color:white; border-radius:5px;">Add Post</button>      
        <h1>What Would You Like To Post Today</h1>
        <textarea rows="5" cols="40"; style="position: absolute; right: 50px"; id="myInput"></textarea>
         <textarea rows="3" cols="40"; style="position: absolute; right: 50px; bottom: 90px;" id="myInput2"></textarea>
        <textarea rows="3" cols="40"; style="position: absolute; right: 50px; bottom: 290px;" id="myInput3"></textarea>
        <h1 id="Name" style="position:absolute; right: 100px; bottom: 150px;">Add Display Name</h1>
        <h1 style="position:absolute; right: 120px; bottom: 350px;">Add Category</h1>
        <textarea rows="1" cols="40"; style="position: absolute; right: 450px; top: 50px;" id="SearchInput"></textarea>
        <h1 style="position:absolute; right: 570px; top: -5px;">Search</h1>
        <button onclick="getChoice(document.getElementById('SearchInput').value);" style="position: absolute; right: 510px; top: 25px; width: 60px; height: 20px; Font-Size:13px; background-color:gray; color:white; border-radius:5px;">Search</button>
        <button id="ChangeName"; onclick="ChangeName();" style="position: absolute; right: 170px; bottom: 100px; width: 100px; height: 60px; Font-Size:23px; background-color:gray; color:white; border-radius:5px; display:none;">Change Name</button>
        <button onclick="ClearText();" style="position: absolute; right: 665px; top: 25px; width: 60px; height: 20px; Font-Size:13px; background-color:gray; color:white; border-radius:5px;">Clear</button>  
        
        <div id="Draw"></div>
        <div style="position: absolute; right: 450px; top: 80px;" id="Draw2"></div>

        <script type="module">   
            "use strict";

            // 1. Core Firebase Cloud Drivers
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
            import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

            // 2. Your Database Configuration Credentials
            const firebaseConfig = {
                apiKey: "AIzaSyDbpPmy2UaNWw5KEFN4liToGjQRbJgkT6Y",
                authDomain: "makecodedatabase.firebaseapp.com",
                projectId: "makecodedatabase",
                storageBucket: "makecodedatabase.firebasestorage.app",
                messagingSenderId: "755171220002",
                appId: "1:755171220002:web:5c2c8a371e472e6363087b"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // 3. Your Arrays
            let Post = [];
            let User = [];
            let idText = [];
            let PostIndex = [];
            let PostIndexVAR = 0;
            let FlaggedPost = [];
            let FlaggedReason = [];
            let Likes = [];
            let Dates = [];
            let Blocked = [];
            let savedName = localStorage.getItem("dbUsername");
            document.getElementById("myInput2").value = savedName || "";
            
            // 4. Cloud Intermediary Engines
            async function LoadFromCloud() {
                const docSnap = await getDoc(doc(db, "MakeCode", "SavedData"));
                if (docSnap.exists()) {
                    let data = docSnap.data();
                    Post = data.Post || [];
                    User = data.User || [];
                    idText = data.idText || [];
                    FlaggedPost = data.FlaggedPost || [];
                    FlaggedReason = data.FlaggedReason || [];
                    Likes = typeof data.Likes === "string" ? JSON.parse(data.Likes) : (data.Likes || []);
                    Dates = data.Dates || [];
                    Blocked = data.Blocked || [];
                    PostIndexVAR = Post.length;
                }
                window.DrawPost(); 
                window.checkSavedName();
            }

            async function SaveToCloud() {
                await setDoc(doc(db, "MakeCode", "SavedData"), {
                    Post: Post,
                    User: User,
                    idText: idText,
                    FlaggedPost: FlaggedPost,
                    FlaggedReason: FlaggedReason,
                    Likes: JSON.stringify(Likes),
                    Dates: Dates,
                    Blocked: Blocked,
                });
            }

            // Fire download sequence when the document mounts
            LoadFromCloud();

            // 5. App Operational Logic (Unchanged Structure)
            window.AddPost = async function(name, post, id) {
                if (Blocked.includes(name)) {
                alert("You have been Blocked by a mod");
                 return
                }
                if (document.getElementById("myInput").value.trim() !== "" && document.getElementById("myInput3").value.trim() !== "") {
                    
                    let currentSavedName = localStorage.getItem("dbUsername");
        if (currentSavedName !== name && User.includes(name)) {
            alert("This name is already claimed by someone else globally! Please choose a different name.");
            return; 
        }
                    localStorage.setItem("dbUsername", name);
                    let words = post.split(" ");
                    for (let i = 0; i < words.length; i++) {
                        if (words[i].includes(".png")) {
                            words[i] = `<img src="${words[i]}" style="max-width: 100%; height: auto; border-radius: 4px;">`;
                        }
                    }
                    let CurrentDate = new Date()
                    post = words.join(" ");
                    Post.push(post);
                    User.push(name);
                    idText.push(id);
                    Likes.push([])
                    Dates.push(CurrentDate.toLocaleDateString())
                    PostIndex.push(PostIndexVAR);
                    PostIndexVAR += 1;
                    window.DrawPost();
                    window.checkSavedName();

                    await SaveToCloud();
                }
            }

            window.getChoice = function(Choice) {
                document.getElementById("Draw2").innerHTML = "";
                 if (Choice == "") {
                    alert("Type Something")
                     return
                    }
                for (let i = 0; i < idText.length; i++) {
                      if (Choice == "%Flagged%" && idText[i].startsWith("%Flagged%")) {
    document.getElementById("Draw2").innerHTML += `
    <div style="background-color:gray; display: block; width: 200px; padding: 15px; padding-right: 120px; border-radius:5px; margin-bottom: 15px;">
        <h3>${User[i]}:</h3>
        <p>${FlaggedReason[FlaggedPost.indexOf(Post[i]) ]}</p>
        <span>${idText[i].replace("%Flagged%", "")}</span>
        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <button onclick="CheckCode(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">🗑️</button>
            <button onclick="CheckUnflagCode(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">✅</button>
        </div>
    </div>
    `;
    continue;
}else if (idText[i] == Choice || idText[i].includes(Choice)) {
                        document.getElementById("Draw2").innerHTML += `
                        <div style="background-color:gray; display: block; width: 200px; padding: 15px; padding-right: 120px; border-radius:5px; margin-bottom: 15px;">
                            <h3>${User[i]}:</h3>
                            <p>${Post[i]}</p>
                            <span>${idText[i]}</span>
                        </div>
                        `;
                        continue;
                    }
                    else if (idText[i] !== Choice || !idText[i].includes(Choice)) {
                        continue;
                    }
                }
            }

            window.RemovePost = async function(index) {
                Post.splice(index, 1);
                User.splice(index, 1);
                idText.splice(index, 1);
                PostIndex.splice(index, 1);
                Dates.splice(index, 1);
                Likes.splice(index, 1);
                for (let i = index; i < PostIndex.length; i++) {
                    PostIndex[i] -= 1;
                }
                window.DrawPost();
                document.getElementById("Draw2").innerHTML = "";

                await SaveToCloud();
            }

            window.DrawPost = function(name, post, id) {
                document.getElementById("Draw").innerHTML = "";
                let visualID = 0;
                for (let i = 0; i < Post.length; i++) {
                    if (idText[i].startsWith("%Flagged%")) {
                    continue
                    } else {
                    document.getElementById("Draw").innerHTML += `
                    <div style="background-color:white; display: block; width: 400px; padding: 15px; border-radius:5px; margin-bottom: 15px; padding-right: 90px">
                        <div style="display: flex; justify-content: flex-start; align-items: center; gap: 10px; margin-bottom: 10px;">
                            <button onclick="Copy(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">Copy</button>
                            <button onclick="CheckCode(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">🗑️</button>
                            <button onclick="CheckFlagCode(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">🚩</button>
                            <button onclick="AddLike(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">👍</button>
                            <button onclick="CheckBlock(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">🚫</button>
                            <button onclick="CheckUnBlock(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">🔓</button>
                            <button onclick="CheckEdit(${i});" style="width: 60px; height: 25px; Font-Size:13px; background-color:white; color:gray; border-radius:5px;">✏️</button>
                            <span style=" font-size: 13px; color: gray;">ID:${visualID}</span>
                            <span style=" font-size: 13px; color: gray;">Likes:${(Likes[i] || []).length}</span>
                            <span style=" font-size: 13px; color: gray;">Date:${(Dates[i] || "No Date")}</span>
                        </div>
                        <h3>${User[i]}:</h3>
                        ${Post[i]}
                    </div>
                    `;
                        visualID++
                }
                }
            }

            window.ClearText = function() {
                document.getElementById("Draw2").innerHTML = "";
                document.getElementById("SearchInput").value = "";
            }

            window.Copy = function(copied) {
                navigator.clipboard.writeText(Post[copied])
                    .then(() => alert("Text successfully copied!"))
                    .catch(err => console.error("Could not copy: ", err));
            }

            window.CheckCode = function(index) {
                let Code = prompt("Please enter the Code:");
                if (btoa(Code) === "JTEzMTEl") {
                    window.RemovePost(index);
                } else {
                    alert("Wrong Code");
                }
            }
            window.CheckFlagCode = async function(index) {
                let Reason = prompt("Please enter the reason why you want this post flagged:");
                if (Reason === null) {
                alert("Nothing Typed")
                } else if (Reason.trim() === "") {
                alert("Nothing Typed")
                } else {
                alert("Thank You for Your Help")
                FlaggedReason.push(Reason)
                FlaggedPost.push(Post[index])
                idText[index] = "%Flagged%" + idText[index];
                window.DrawPost()
                await SaveToCloud();
                }
            }
            window.checkSavedName = function() {
            let savedName = localStorage.getItem("dbUsername");
            if (savedName !== null) {
            document.getElementById("myInput2").style.display = "none";
            document.getElementById("Name").innerText = "Locked " + savedName;
            document.getElementById("ChangeName").style.display = "block"
            document.getElementById("Name").style.color = "black";
            document.getElementById("Name").style.right = "20px";
            }
            }

           window.RemoveSavedName = async function(index) {
            let Ask = prompt("Do You want this post type 1 or all post type 2")
                if (Ask === "1") {
            let NewName = prompt("Please enter the New Name:");
            if (NewName !== null && NewName.trim() !== "") {
            User[index] = NewName; 
            window.DrawPost();
            await SaveToCloud();
            alert("Name updated successfully!");
                }
            } else if (Ask === "2") {
                let oldName = User[index]; 
                let NewName = prompt("Please enter the New Name:");
              if (localStorage.getItem("dbUsername") === oldName) {
                  localStorage.setItem("dbUsername", NewName);
              }
              if (NewName !== null && NewName.trim() !== "") {  
              for (let i = 0; i < User.length; i++) {
                  if (User[i] === oldName) {
                      User[i] = NewName
               }
               }
               window.DrawPost();
               await SaveToCloud();
                alert("All posts by " + oldName + " are now updated to " + NewName);
            }
            }
            }
            window.AddLike = async function(index) {
            if (!Likes[index]) {
            Likes[index] = [];
            }
            let savedName = localStorage.getItem("dbUsername");
            if (!Likes[index].includes(savedName)) {
                    Likes[index].push(savedName)
            }else {
                 Likes[index].splice(Likes[index].indexOf(savedName),1)
            }
            window.DrawPost();
            await SaveToCloud();
            }
            window.Block = async function(index) {
            let oldName = User[index]; 
            Blocked.push(oldName)
            window.DrawPost();
            await SaveToCloud();
            }
            window.UnBlock = async function(index) {
            let nameToUnblock = User[index]; 
            let blockIndex = Blocked.indexOf(nameToUnblock);
                
            if (blockIndex !== -1) {
            Blocked.splice(blockIndex, 1);
            alert(nameToUnblock + " has been unblocked.");
            window.DrawPost();
            await SaveToCloud();
            } else {
               alert("This user is not currently blocked.");
            }
            }
            window.CheckBlock = async function(index) {
                let Code = prompt("Please enter the code:");
                if (btoa(Code) === "JTEzMTEl") {
                    window.Block(index);
                } else {
                    alert("Wrong Code");
                }
            }
            window.CheckUnBlock = async function(index) {
                let Code = prompt("Please enter the code:");
                if (btoa(Code) === "JTEzMTEl") {
                    window.UnBlock(index);
                } else {
                    alert("Wrong Code");
                }
            }
            window.ChangeName = async function() {
    let NewName = prompt("Please enter your new name:");
    if (NewName === null || NewName.trim() === "") return;
    NewName = NewName.trim(); 

    let currentName = localStorage.getItem("dbUsername");

    if (NewName === currentName) {
        alert("You are already using this name!");
        return;
    }

    for (let i = 0; i < User.length; i++) {
        if (User[i] === NewName && User[i] !== currentName) {
            alert("This name is already claimed by someone else globally! Please choose a different name.");
            return; 
        }
    }

    for (let i = 0; i < User.length; i++) {
        if (User[i] === currentName) {
            User[i] = NewName;
        }
    }
    
    alert("Name Changed");
    localStorage.setItem("dbUsername", NewName);
    window.checkSavedName();
    window.DrawPost();
    await SaveToCloud();
}
            window.CheckEdit = async function(index) {
                let Code = prompt("Please enter the code:");
                if (btoa(Code) === "JTEzMTEl") {
                    window.Edit(index);
                } else {
                    alert("Wrong Code");
                }
            }
            window.Edit = async function(index) {
                let Choice = prompt("What would you like to edit between Post,Name,Date,Category")
                if (Choice === null) {
                alert("Nothing Typed")
                    return 
                } else if (Choice.trim() === "") {
                alert("Nothing Typed")
                    return
                }
                if (Choice !== null && Choice.trim() !== "") {
                if (Choice == "Post") {
                let EditPost = prompt("Change " + Post[index] + " to:")
                if (EditPost === null) {
                alert("Nothing Typed")
                    return 
                } else if (EditPost.trim() === "") {
                alert("Nothing Typed")
                    return
                }
                Post[index] = EditPost
                } else if (Choice == "Name") {
                window.RemoveSavedName(index);
                } else if (Choice == "Date") {
                let EditDate = prompt("Change " + Dates[index] + " to:")
                if (EditDate === null) {
                alert("Nothing Typed")
                    return 
                } else if (EditDate.trim() === "") {
                alert("Nothing Typed")
                    return
                }
                Dates[index] = EditDate
                } else if (Choice == "Category") {
                let EditCategory = prompt("Change " + idText[index] + " to:")
                if (EditCategory === null) {
                alert("Nothing Typed")
                    return 
                } else if (EditCategory.trim() === "") {
                alert("Nothing Typed")
                    return
                }
                idText[index] = EditCategory
                }
                }
                window.DrawPost();
                await SaveToCloud(); 
            }
            window.CheckUnflagCode = async function(index) {
    let Code = prompt("Please enter the code:");
    if (btoa(Code) === "JTEzMTEl") {
        window.Unflag(index);
    } else {
        alert("Wrong Code");
    }
}

window.Unflag = async function(index) {
    idText[index] = idText[index].replace("%Flagged%", "");

    let flagIndex = FlaggedPost.indexOf(Post[index]);
    if (flagIndex !== -1) {
        FlaggedPost.splice(flagIndex, 1);
        FlaggedReason.splice(flagIndex, 1);
    }

    alert("Post has been unflagged and restored to its original category!");

    window.DrawPost();
    document.getElementById("Draw2").innerHTML = "";
    await SaveToCloud();
}
        </script>
    </body>
</html>
